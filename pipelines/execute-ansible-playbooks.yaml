---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: execute-ansible-playbooks
spec:
  workspaces:
    - name: shared-workspace
    - name: sshCredentials
      optional: true
    - name: sopsKeys
      optional: true
      description: >-
        Optional workspace holding SOPS decryption keys (age key file and/or
        PGP private key). Bound only when decryptSops is enabled.
  params:
    - name: ansibleExtraRoles
      type: array
      default: []
      description: extra roles to install
    - name: ansibleExtraCollections
      type: array
      default: []
      description: extra collections to install
    - name: ansiblePlaybooks
      type: array
      default: []
      description: playbooks to execute
    - name: ansibleTargetHost
      type: string
      default: "all"
      description: ansible variable for target host/group
    - name: ansibleVarsFile
      type: array
      default: []
      description: values for ansible vars file
    - name: ansibleVarsInventory
      type: array
      default: []
      description: values for ansible inventory
    - name: varsFile
      type: string
      default: ""
      description: varsFile as b64 string (later to be merged with key values)
    - name: ansibleWorkingImage
      type: string
      default: "ghcr.io/stuttgart-things/sthings-ansible:11.11.0"
      description: the image on which ansible will run
    - name: ansibleVerbosity
      type: string
      default: "2"
      description: ansible verbosity level (0-4, where 0 is minimal)
    - name: validateInventory
      type: string
      default: "true"
      description: validate inventory before running playbooks
    - name: createInventory
      type: string
      default: "false"
      description: create inventory
    - name: inventory
      type: string
      default: ""
      description: inventory as b64 string
    - name: vaultSecretName
      type: string
      default: vault
      description: name of the vault secret
    - name: gitRepoUrl
      type: string
      default: ""
      description: source git repo
    - name: gitRevision
      type: string
      default: "main"
      description: revision of source git repo
    - name: gitWorkspaceSubdirectory
      type: string
      default: ""
      description: subdirectory on workspace
    - name: installExtraRoles
      type: string
      default: "false"
      description: install additional roles
    - name: installExtraCollections
      type: string
      default: "false"
      description: install additional collections
    - name: userHome
      type: string
      default: "/home/nonroot"
      description: absolute path to the user's home directory
    # Add new parameters for ansible credentials secret
    - name: ansibleCredentialsSecretName
      type: string
      default: "ansible-credentials"
      description: name of the secret containing ansible credentials
    - name: ansibleCredentialsUserKey
      type: string
      default: "ANSIBLE_USER"
      description: key for ansible user in the secret
    - name: ansibleCredentialsPasswordKey
      type: string
      default: "ANSIBLE_PASSWORD"
      description: key for ansible password in the secret
    # -------------------------------
    # SOPS decryption (runs after the git clone, before ansible)
    # -------------------------------
    - name: decryptSops
      type: string
      default: "false"
      description: >-
        When "true", decrypt SOPS-encrypted files from the cloned repo before
        running ansible. Requires the sopsKeys workspace to be bound.
    - name: sopsFiles
      type: string
      default: ""
      description: >-
        Whitespace-separated files to decrypt, relative to the shared workspace
        root (e.g. "<gitWorkspaceSubdirectory>/secrets.sops.yaml"). Empty =>
        every file matching sopsFilePattern.
    - name: sopsFilePattern
      type: string
      default: "*.sops.yaml"
      description: find(1) -name pattern used when sopsFiles is empty.
    - name: sopsAgeKeyFile
      type: string
      default: "age.agekey"
      description: >-
        Name of the age key file inside the sopsKeys workspace (the
        sops-secrets-operator project key secret exposes it as "age.agekey").
  tasks:
    - name: execute-ansible
      runAfter:
        - fetch-repository
        - decrypt-sops
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/stuttgart-things/stage-time.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/execute-ansible.yaml
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: CREATE_INVENTORY
          value: $(params.createInventory)
        - name: EXTRA_ROLES
          value: $(params.ansibleExtraRoles[*])
        - name: EXTRA_COLLECTIONS
          value: $(params.ansibleExtraCollections[*])
        - name: EXTRA_VARS
          value: $(params.ansibleVarsFile[*])
        - name: INSTALL_EXTRA_ROLES
          value: $(params.installExtraRoles)
        - name: INSTALL_EXTRA_COLLECTIONS
          value: $(params.installExtraCollections)
        - name: INVENTORY
          value: $(params.inventory)
        - name: VARS_FILE
          value: $(params.varsFile)
        - name: INVENTORY_VARS
          value: $(params.ansibleVarsInventory[*])
        - name: PLAYBOOKS
          value: $(params.ansiblePlaybooks[*])
        - name: TARGET_HOST
          value: $(params.ansibleTargetHost)
        - name: SUB_DIRECTORY
          value: $(params.gitWorkspaceSubdirectory)
        - name: USER_HOME
          value: $(params.userHome)
        - name: WORKING_IMAGE
          value: $(params.ansibleWorkingImage)
        - name: ANSIBLE_VERBOSITY
          value: $(params.ansibleVerbosity)
        - name: VALIDATE_INVENTORY
          value: $(params.validateInventory)
        - name: vault-secret-name
          value: $(params.vaultSecretName)
        # Add the new parameters for ansible credentials
        - name: ansible-credentials-secret-name
          value: $(params.ansibleCredentialsSecretName)
        - name: ansible-credentials-user-key
          value: $(params.ansibleCredentialsUserKey)
        - name: ansible-credentials-password-key
          value: $(params.ansibleCredentialsPasswordKey)
    - name: fetch-repository
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/tektoncd/catalog.git
          # Pinned to a fixed commit for reproducibility/supply-chain safety
          # (external dependency). tektoncd/catalog main @ 2026-06; bump
          # deliberately. The stage-time self-reference above stays on `main`
          # so local task edits still auto-propagate.
          - name: revision
            value: 7ea2968e224633b4967d60217b33bb4d38fa53d9 # pragma: allowlist secret (git commit SHA, not a secret)
          - name: pathInRepo
            value: task/git-clone/0.10/git-clone.yaml
      workspaces:
        - name: output
          workspace: shared-workspace
        - name: ssh-directory
          workspace: sshCredentials
      params:
        - name: deleteExisting
          value: 'true'
        - name: revision
          value: $(params.gitRevision)
        - name: subdirectory
          value: $(params.gitWorkspaceSubdirectory)
        - name: url
          value: $(params.gitRepoUrl)
    - name: decrypt-sops
      runAfter:
        - fetch-repository
      when:
        - input: $(params.decryptSops)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/stuttgart-things/stage-time.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/decrypt-sops.yaml
      workspaces:
        # Decrypt in place: read the cloned encrypted files from the shared
        # workspace and write the plaintext back to the same paths so the
        # ansible task (workingDir = <shared>/<gitWorkspaceSubdirectory>) reads
        # the decrypted files.
        - name: input
          workspace: shared-workspace
        - name: output
          workspace: shared-workspace
        - name: sops-keys
          workspace: sopsKeys
      params:
        - name: files
          value: $(params.sopsFiles)
        - name: filePattern
          value: $(params.sopsFilePattern)
        - name: outputSubdirectory
          value: ""
        - name: ageKeyFile
          value: $(params.sopsAgeKeyFile)
        - name: verbose
          value: "true"
