repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # KCL files are formatted by `kcl fmt` (call-kcl-validate.yaml), which
        # owns their whitespace/trailing-newline style. kcl fmt emits a trailing
        # blank line that end-of-file-fixer would otherwise strip back, so the
        # two hooks fight. Let kcl fmt be authoritative for *.k.
        exclude: ^kcl/.*\.k$
      - id: end-of-file-fixer
        exclude: ^kcl/.*\.k$
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-symlinks
      #- id: check-yaml
      - id: detect-private-key
  # hadolint via the bundled static binary on PATH (provided by the dagger
  # linting module, v0.119.0+). The upstream hadolint/hadolint hook ids
  # (`hadolint`, `hadolint-docker`) are Docker-based and don't work inside the
  # Dagger container — so wire a local/system hook against the binary instead.
  - repo: local
    hooks:
      - id: hadolint
        name: Lint Dockerfiles with hadolint
        entry: hadolint
        language: system
        types: [dockerfile]
        args:
          - --ignore
          - DL4006   # set -o pipefail before RUN with a pipe
          - --ignore
          - DL3015   # avoid additional packages (--no-install-recommends)
          - --ignore
          - DL3018   # pin versions in apk add
          - --ignore
          - DL4001   # either wget or curl, not both
          - --ignore
          - DL3042   # avoid pip cache dir
          - --ignore
          - DL3013   # pin versions in pip
          - --ignore
          - DL3002   # last USER should not be root
          - --ignore
          - SC1091   # can't follow runtime-sourced files (e.g. cargo env)
  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.30.0
    hooks:
      - id: check-github-workflows

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        description: Detects high entropy strings that are likely to be passwords.
        entry: detect-secrets-hook
        language: python
        # for backward compatibility
        files: .*  # all files
        args:
          - "--exclude-files"
          # README carries example secrets. *.k files are formatted by `kcl fmt`,
          # which relocates a trailing `pragma: allowlist secret` onto its own
          # line above the value, where detect-secrets no longer honors it — so
          # in-line allowlisting can't survive in KCL. kcl fmt is authoritative
          # for *.k (matching the trailing-whitespace/end-of-file-fixer excludes).
          - "(kcl/ansible/README\\.md|\\.k$)"
