---
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  name: execute-tofu-run
  namespace: tekton-ci
spec:
  taskRef:
    name: execute-tofu
  params:
    - name: ACTION
      value: "apply"
    - name: AUTO_APPROVE
      value: "true"
    - name: SUB_DIRECTORY
      value: "terraform"
    - name: TF_VARS
      value:
        # String values must be DOUBLE-quoted in the value half — the tfvars line
        # is HCL (region = "eu-central-1"), and HCL rejects single quotes. Wrap the
        # whole item in YAML single quotes so the inner double quotes survive.
        # Numbers need no quotes (instance_count = 2 is a valid HCL number).
        - 'region+-"eu-central-1"'
        - "instance_count+-2"
    - name: BACKEND_CONFIG
      value:
        - "bucket+-my-tf-state"
        - "key+-stage-time/terraform.tfstate"
  workspaces:
    - name: source
      persistentVolumeClaim:
        claimName: terraform-source-pvc
    # optional - private CA trust, per run (omit if not needed)
    - name: ca-certs
      secret:
        secretName: private-ca # pragma: allowlist secret
