---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: execute-ansible-playbooks
  labels:
    app.kubernetes.io/version: "0.6"
  annotations:
    tekton.dev/categories: "configuration-mgmt"
    tekton.dev/pipelines.minVersion: "0.17.0"
    tekton.dev/platforms: "linux/amd64,linux/s390x,linux/ppc64le,linux/arm64"
    tekton.dev/tags: "image-build"
spec:
  description: execute ansible playbooks with enhanced security and error handling
  workspaces:
    - name: source
      description: holds the working data
      optional: false
  params:
    - name: CREATE_INVENTORY
      description: create inventory
      type: string
      default: "false"
    - name: EXTRA_ROLES
      description: ansible extra roles
      type: array
      default: []
    - name: EXTRA_COLLECTIONS
      description: ansible extra collections
      type: array
      default: []
    - name: EXTRA_VARS
      description: ansible extra vars
      type: array
      default: []
    - name: INSTALL_EXTRA_ROLES
      description: install roles
      type: string
      default: "false"
    - name: INSTALL_EXTRA_COLLECTIONS
      description: install collections
      type: string
      default: "false"
    - name: INVENTORY_VARS
      description: ansible inventory vars
      type: array
      default: []
    - name: INVENTORY
      description: inventory as b64
      type: string
      default: ""
    - name: PLAYBOOKS
      description: ansible playbooks to execute
      type: array
      default: []
    - name: SUB_DIRECTORY
      description: subdirectory of workspace
      type: string
      default: ""
    - name: USER_HOME
      description: absolute path to the user's home directory
      type: string
      default: "/home/nonroot"
    - name: TARGET_HOST
      description: ansible variable for target host/group
      type: string
      default: "all"
    - name: VARS_FILE
      description: vars file as b64 (later to be merged with extra vars)
      type: string
      default: ""
    - name: WORKING_IMAGE
      description: the image on which ansible will run
      type: string
      default: "eu.gcr.io/stuttgart-things/sthings-ansible:11.0.0"
    - name: ANSIBLE_VERBOSITY
      description: ansible verbosity level (0-4, where 0 is minimal)
      type: string
      default: "2"
    - name: VALIDATE_INVENTORY
      description: validate inventory before running playbooks
      type: string
      default: "true"
    - name: vault-secret-key-addr
      description: vault addr key in the secret
      type: string
      default: "VAULT_ADDR"
    - name: vault-secret-key-approleId
      description: approle id key in the secret
      type: string
      default: "VAULT_ROLE_ID"
    - name: vault-secret-key-approleSecret
      description: approle secret key in the secret
      type: string
      default: "VAULT_SECRET_ID"
    - name: vault-secret-key-namespace
      description: namespace key in the secret
      type: string
      default: "VAULT_NAMESPACE"
    - name: vault-secret-name
      description: name of the vault secret
      type: string
      default: "vault"
    - name: ansible-credentials-secret-name
      description: name of the secret containing ansible credentials
      type: string
      default: "ansible-credentials"
    - name: ansible-credentials-user-key
      description: key for ansible user in the secret
      type: string
      default: "ANSIBLE_USER"
    - name: ansible-credentials-password-key
      description: key for ansible password in the secret
      type: string
      default: "ANSIBLE_PASSWORD"
  results:
    - name: playbooks-executed
      description: number of playbooks successfully executed
  stepTemplate:
    workingDir: $(workspaces.source.path)/$(params.SUB_DIRECTORY)
    image: "$(params.WORKING_IMAGE)"
    securityContext:
      privileged: false
      runAsNonRoot: true
      runAsUser: 65532
  steps:
    - name: create-inventory-vars
      args:
        - $(params.INVENTORY_VARS[*])
      script: |
        #!/usr/bin/env sh
        set -eu

        echo "Creating vars file"
        rm -rf ./vars.yaml
        echo "---" > ./vars.yaml

        if [ "$(params.CREATE_INVENTORY)" = "true" ] ; then
          echo "inventory_groups:" >> ./vars.yaml
          echo "  host_groups:" >> ./vars.yaml

          for param in "$@"
          do
            group=$(echo "$param" | cut -d "+" -f1)
            host=$(echo "$param" | cut -d "+" -f2)
            echo "Processing group: $group"
            echo "Processing host: $host"

            if [[ $host =~ \[\".*\"\] ]]; then
              echo "String is already correctly formatted: $host"
            else
              echo "Formatting string: $host"
              host=$(echo "$host" | sed 's/\[/\[\"/g; s/\]/\"]/g')
            fi

            echo "Final host value: $host"
            yq -i '.inventory_groups.host_groups.'"${group}"' += '"${host}" ./vars.yaml
          done
        else
          echo "Skipped creating extended inventory"
        fi

        echo "Contents of vars.yaml:"
        cat ./vars.yaml

    - name: create-vars-file
      args:
        - $(params.EXTRA_VARS[*])
      script: |
        #!/usr/bin/env sh
        set -eu

        echo "Adding extra vars to vars.yaml"
        for argument in "$@"; do
          echo "$argument" | sed -e "s/+-/: /g" >> vars.yaml
        done

        echo "Current vars.yaml contents:"
        cat ./vars.yaml

    - name: merge-vars-file
      env:
        - name: VARS_FILE
          value: $(params.VARS_FILE)
      script: |
        #!/usr/bin/env sh
        set -eu

        if [ -z "${VARS_FILE}" ]; then
          echo "Extra vars file is empty - nothing to merge"
        else
          echo "Decoding and merging vars file from base64"
          echo "${VARS_FILE}" | base64 -d > ./to-be-merged.yaml

          echo "Contents to be merged:"
          cat ./to-be-merged.yaml

          yq eval-all 'select(fileIndex == 0) * select(fileIndex == 1)' ./vars.yaml ./to-be-merged.yaml -i
          rm -f ./to-be-merged.yaml
        fi

        echo "Final merged vars.yaml:"
        cat ./vars.yaml

    - name: install-roles
      args:
        - $(params.EXTRA_ROLES[*])
      script: |
        #!/usr/bin/env sh
        set -eu

        if [ "$(params.INSTALL_EXTRA_ROLES)" = "true" ] ; then
          echo "Installing additional Ansible roles"

          mkdir -p ./roles

          for param in "$@"
          do
            echo "Installing role from: ${param}"
            if ansible-galaxy install "git+${param}" -f --roles-path ./roles; then
              echo "Successfully installed role from ${param}"
            else
              echo "ERROR: Failed to install role from ${param}"
              exit 1
            fi
          done

          echo "Installed roles:"
          ls -lta ./roles
        else
          echo "Skipped installing additional roles"
        fi

    - name: install-collections
      args:
        - $(params.EXTRA_COLLECTIONS[*])
      script: |
        #!/usr/bin/env sh
        set -eu

        if [ "$(params.INSTALL_EXTRA_COLLECTIONS)" = "true" ] ; then
          echo "Installing additional Ansible collections"

          mkdir -p ./collections

          for param in "$@"
          do
            echo "Installing collection: ${param}"
            if ansible-galaxy collection install "${param}" -f -p ./collections; then
              echo "Successfully installed collection ${param}"
            else
              echo "ERROR: Failed to install collection ${param}"
              exit 1
            fi
          done

          echo "Installed collections:"
          ls -lta ./collections/ansible_collections 2>/dev/null || echo "No collections directory found"
        else
          echo "Skipped installing additional collections"
        fi

    - name: create-inventory-file
      env:
        - name: INVENTORY
          value: $(params.INVENTORY)
        - name: CREATE_INVENTORY
          value: $(params.CREATE_INVENTORY)
      script: |
        #!/usr/bin/env sh
        set -eu

        if [ "${CREATE_INVENTORY}" = "true" ]; then
          echo "Creating inventory from vars.yaml inventory_groups"

          # Check if vars.yaml has inventory_groups
          if yq eval '.inventory_groups.host_groups' ./vars.yaml > /dev/null 2>&1; then
            # Extract host groups and create inventory
            rm -rf ./inventory

            # Get all group names
            GROUPS=$(yq eval '.inventory_groups.host_groups | keys | .[]' ./vars.yaml)

            for group in $GROUPS; do
              echo "[$group]" >> ./inventory
              # Get hosts for this group and add them
              yq eval ".inventory_groups.host_groups.${group}[]" ./vars.yaml >> ./inventory
              echo "" >> ./inventory
            done

            echo "Created inventory from vars.yaml:"
            cat ./inventory
          else
            echo "No inventory_groups found in vars.yaml, creating default"
            echo "[all]" > ./inventory
            echo "localhost ansible_connection=local" >> ./inventory
          fi
        elif [ -n "${INVENTORY}" ]; then
          echo "Decoding inventory from base64"
          echo "${INVENTORY}" | base64 -d > ./inventory
          echo "Inventory file contents:"
          cat ./inventory
        else
          echo "No inventory specified - creating default inventory"
          echo "[all]" > ./inventory
          echo "localhost ansible_connection=local" >> ./inventory
        fi

    - name: validate-inventory
      script: |
        #!/usr/bin/env sh
        set -eu

        if [ "$(params.VALIDATE_INVENTORY)" = "true" ]; then
          echo "Validating inventory file"
          if ansible-inventory -i ./inventory --list > /dev/null 2>&1; then
            echo "Inventory validation successful"
          else
            echo "ERROR: Inventory validation failed"
            echo "Inventory contents:"
            cat ./inventory
            exit 1
          fi
        else
          echo "Skipped inventory validation"
        fi

    - name: run-ansible-playbook
      args:
        - $(params.PLAYBOOKS[*])
      env:
        - name: ANSIBLE_HOST_KEY_CHECKING
          value: "False"
        - name: HOME
          value: $(params.USER_HOME)
        - name: ANSIBLE_USER
          valueFrom:
            secretKeyRef:
              name: $(params.ansible-credentials-secret-name)
              key: $(params.ansible-credentials-user-key)
              optional: true
        - name: ANSIBLE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.ansible-credentials-secret-name)
              key: $(params.ansible-credentials-password-key)
              optional: true
        - name: VAULT_ADDR
          valueFrom:
            secretKeyRef:
              key: $(params.vault-secret-key-addr)
              name: $(params.vault-secret-name)
              optional: true
        - name: VAULT_NAMESPACE
          valueFrom:
            secretKeyRef:
              key: $(params.vault-secret-key-namespace)
              name: $(params.vault-secret-name)
              optional: true
        - name: VAULT_ROLE_ID
          valueFrom:
            secretKeyRef:
              key: $(params.vault-secret-key-approleId)
              name: $(params.vault-secret-name)
              optional: true
        - name: VAULT_SECRET_ID
          valueFrom:
            secretKeyRef:
              key: $(params.vault-secret-key-approleSecret)
              name: $(params.vault-secret-name)
              optional: true
      script: |
        #!/usr/bin/env sh
        set -eu

        # Setup Ansible directories
        mkdir -p "${HOME}/.ansible/roles"
        mkdir -p "${HOME}/.ansible/collections"

        echo "Installing roles and collections to home directory"
        if [ -d "roles" ] && [ -n "$(ls -A roles 2>/dev/null)" ]; then
          cp -R roles/* "${HOME}/.ansible/roles/"
          echo "Installed roles:"
          ansible-galaxy role list
        else
          echo "No roles to install"
        fi

        if [ -d "collections" ] && [ -n "$(ls -A collections 2>/dev/null)" ]; then
          cp -R collections/* "${HOME}/.ansible/collections/"
          echo "Installed collections:"
          ansible-galaxy collection list
        else
          echo "No collections to install"
        fi

        # Create secure credentials file if credentials are provided
        CREDS_FILE=""
        if [ -n "${ANSIBLE_USER:-}" ] && [ -n "${ANSIBLE_PASSWORD:-}" ]; then
          echo "Setting up Ansible credentials securely"
          CREDS_FILE="${HOME}/.ansible_creds.yml"
          cat > "${CREDS_FILE}" <<EOF
        ansible_user: "${ANSIBLE_USER}"
        ansible_password: "${ANSIBLE_PASSWORD}"
        ansible_become_password: "${ANSIBLE_PASSWORD}"
        EOF
          chmod 600 "${CREDS_FILE}"
        fi

        # Build verbosity flag
        VERBOSITY=""
        if [ "$(params.ANSIBLE_VERBOSITY)" != "0" ]; then
          VERBOSITY=$(printf 'v%.0s' $(seq 1 $(params.ANSIBLE_VERBOSITY)))
          VERBOSITY="-${VERBOSITY}"
        fi

        echo "Starting playbook execution"
        PLAYBOOKS_EXECUTED=0

        for playbook in "$@"
        do
          # Validate playbook exists (skip validation for collection playbooks)
          # Collection playbooks follow the pattern: namespace.collection.playbook
          if [[ ! "$playbook" =~ ^[a-z_]+\.[a-z_]+\.[a-z_]+ ]]; then
            # This is a file-based playbook, validate it exists
            if [ ! -f "$playbook" ]; then
              echo "ERROR: Playbook file not found: $playbook"
              exit 1
            fi
          else
            echo "Detected collection playbook: $playbook (skipping file validation)"
          fi

          echo "=========================================="
          echo "Executing playbook: $playbook"
          echo "=========================================="

          # Build ansible-playbook command
          ANSIBLE_CMD="ansible-playbook ${VERBOSITY} \
            -i $(workspaces.source.path)/$(params.SUB_DIRECTORY)/inventory \
            -e inv_path=$(workspaces.source.path)/$(params.SUB_DIRECTORY)/inventory \
            -e target_host=$(params.TARGET_HOST) \
            -e path_to_vars_file=$(workspaces.source.path)/$(params.SUB_DIRECTORY)/vars"

          # Add credentials file if it exists
          if [ -n "${CREDS_FILE}" ]; then
            ANSIBLE_CMD="${ANSIBLE_CMD} --extra-vars @${CREDS_FILE}"
          fi

          # Add playbook path
          ANSIBLE_CMD="${ANSIBLE_CMD} ${playbook}"

          # Show the exact command being executed
          echo "=========================================="
          echo "ANSIBLE COMMAND:"
          echo "${ANSIBLE_CMD}"
          echo "=========================================="

          # Show inventory contents
          echo "INVENTORY FILE:"
          cat $(workspaces.source.path)/$(params.SUB_DIRECTORY)/inventory
          echo "=========================================="

          # Show vars file contents
          echo "VARS FILE:"
          cat $(workspaces.source.path)/$(params.SUB_DIRECTORY)/vars.yaml
          echo "=========================================="

          # Show credentials file if exists (without passwords)
          if [ -n "${CREDS_FILE}" ]; then
            echo "CREDENTIALS FILE CREATED: ${CREDS_FILE}"
            echo "(Contents hidden for security)"
            echo "=========================================="
          fi

          # Execute playbook with shell tracing
          set -x
          if eval ${ANSIBLE_CMD}; then
            set +x
            echo "Successfully executed playbook: $playbook"
            PLAYBOOKS_EXECUTED=$((PLAYBOOKS_EXECUTED + 1))
          else
            echo "ERROR: Failed to execute playbook: $playbook"
            # Cleanup credentials file before exit
            [ -n "${CREDS_FILE}" ] && rm -f "${CREDS_FILE}"
            exit 1
          fi
        done

        # Cleanup credentials file
        if [ -n "${CREDS_FILE}" ]; then
          rm -f "${CREDS_FILE}"
          echo "Cleaned up credentials file"
        fi

        # Write results
        echo -n "${PLAYBOOKS_EXECUTED}" > $(results.playbooks-executed.path)
        echo "=========================================="
        echo "Execution complete: ${PLAYBOOKS_EXECUTED} playbook(s) executed successfully"
        echo "=========================================="
